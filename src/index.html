<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>MCPViews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="bg-pattern" aria-hidden="true"></div>
  <div id="app">
    <div id="main">
      <div id="main-header">
        <div id="header-left">
          <button id="refresh-button" aria-label="Refresh renderer" title="Refresh renderer" class="header-icon-btn" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.65 2.35A7.96 7.96 0 0 0 8 0C3.58 0 0 3.58 0 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 8 14 6 6 0 1 1 8 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/>
            </svg>
          </button>
          <button id="ai-shell-toggle-button" aria-label="Collapse workspace navigator" title="Collapse workspace navigator" class="header-icon-btn" style="display:none;">&lt;</button>
          <span id="main-title" class="title">MCPViews</span>
        </div>
        <div id="header-actions">
          <div id="connection-status">
            <span id="connection-dot" class="dot connected"></span>
            <span id="connection-text">Ready</span>
          </div>
          <button id="ai-home-button" class="header-chip-btn" aria-label="Toggle workspace" title="Toggle workspace">
            <span class="header-chip-dot"></span>
            <span>Workspace</span>
          </button>
          <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
            <span class="theme-icon-light">☀</span>
            <span class="theme-icon-dark">☾</span>
          </button>
          <button id="apps-button" aria-label="Apps" title="Apps">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor"/>
              <rect x="10" y="1" width="5" height="5" rx="1" fill="currentColor"/>
              <rect x="1" y="10" width="5" height="5" rx="1" fill="currentColor"/>
              <rect x="10" y="10" width="5" height="5" rx="1" fill="currentColor"/>
            </svg>
          </button>
          <div id="apps-dropdown" class="apps-dropdown hidden"></div>
        </div>
      </div>
      <div id="tab-bar"></div>
      <div id="main-body">
        <aside id="ai-shell" class="hidden" aria-label="workspace navigation"></aside>
        <div id="content-area"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>if(typeof mermaid!=='undefined')mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose',suppressErrorRendering:true});</script>

  <script>
(function() {
  var html = document.documentElement;
  var saved = localStorage.getItem('mcpviews-theme');
  if (saved) {
    html.setAttribute('data-theme', saved);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    html.setAttribute('data-theme', 'dark');
  }

  function syncNativeTheme(theme) {
    if (window.__TAURI_INTERNALS__) {
      window.__TAURI_INTERNALS__.invoke('set_native_theme', { theme: theme }).catch(function() {});
    }
  }

  // Sync native window theme on initial load
  syncNativeTheme(html.getAttribute('data-theme') || 'light');

  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('mcpviews-theme', next);
        syncNativeTheme(next);
        if (typeof mermaid !== 'undefined') {
          mermaid.initialize({ startOnLoad: false, theme: next === 'dark' ? 'dark' : 'default', securityLevel: 'loose', suppressErrorRendering: true });
        }
        if (window.__companionUtils && window.__companionUtils.reRenderMermaid) {
          window.__companionUtils.reRenderMermaid();
        }
      });
    }

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('mcpviews-theme')) {
          var theme = e.matches ? 'dark' : 'light';
          html.setAttribute('data-theme', theme);
          syncNativeTheme(theme);
          if (typeof mermaid !== 'undefined') {
            mermaid.initialize({ startOnLoad: false, theme: theme === 'dark' ? 'dark' : 'default', securityLevel: 'loose', suppressErrorRendering: true });
          }
          if (window.__companionUtils && window.__companionUtils.reRenderMermaid) {
            window.__companionUtils.reRenderMermaid();
          }
        }
      });
    }
  });
})();
</script>

  <!-- Renderers (same as companion, loaded as vanilla JS) -->
  <script src="./renderers/shared.js"></script>
  <script src="./renderers/suggestion-widgets.js"></script>
  <script src="./renderers/document-preview.js"></script>
  <script src="./renderers/mermaid-renderer.js"></script>
  <script src="./renderers/rich-content.js"></script>
  <script src="./renderers/structured-data-utils.js"></script>
  <script src="./renderers/structured-data.js"></script>
  <script src="./renderers/citation-panel.js"></script>
  <script src="./renderers/drawer-stack.js"></script>
  <script src="./renderers/invocation-registry.js"></script>
  <script type="module" src="./cloudflare-agent-bridge.js"></script>
  <script src="./renderers/tribex-ai-utils.js"></script>
  <script src="./renderers/tribex-ai-client.js"></script>
  <script src="./renderers/tribex-ai-state-core.js"></script>
  <script src="./renderers/tribex-ai-state-projection.js"></script>
  <script src="./renderers/tribex-ai-state-runtime.js"></script>
  <script src="./renderers/tribex-ai-state-actions.js"></script>
  <script src="./renderers/tribex-ai-state.js"></script>
  <script src="./renderers/tribex-ai-shell.js"></script>
  <script src="./renderers/tribex-ai-thread.js"></script>

  <script src="./main.js"></script>
</body>
</html>
